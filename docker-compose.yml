services:

  # Base de données PostgreSQL
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: forum
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - db-network
    restart: unless-stopped

  # API
  api:
    build: ./api
    environment:
      DB_HOST: db
      DB_NAME: forum
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 3000
    networks:
      - app-network
      - db-network
    depends_on:
      - db
    restart: unless-stopped

  # Thread - affichage des messages
  thread:
    build: ./thread
    environment:
      API_URL: http://api:3000
      PORT: 80
    ports:
      - "80:80"
    networks:
      - app-network
    depends_on:
      - api
    restart: unless-stopped

  # Sender - envoi des messages
  sender:
    build: ./sender
    environment:
      API_URL: http://api:3000
      PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - app-network
    depends_on:
      - api
    restart: unless-stopped

# Réseaux
networks:
  app-network:
    driver: bridge
  db-network:
    driver: bridge

# Volume pour persister les données de la DB
volumes:
  db-data: